# OpenOCD 配置 — FM33A068EV + J-Link
#
# 使用方法:
#   openocd -f openocd/fm33a068ev.cfg -c "program target/thumbv6m-none-eabi/release/femeter verify reset exit"
#
# 或烧录 bootloader:
#   openocd -f openocd/fm33a068ev.cfg -c "program target/thumbv6m-none-eabi/release/femeter-boot 0x0 verify reset exit"

# J-Link 接口
source [find interface/jlink.cfg]

# 目标: Cortex-M0+ (ARM CM0)
transport select swd
source [find target/swj-dp.tcl]
cortex_m reset_config srst_only

# FM33A068EV Flash 配置 (FM33 内置 Flash)
# Bank 0: 512KB @ 0x00000000
set CHIP_NAME fm33a068ev
set FLASH_SIZE 0x80000

# SWD 速度
adapter speed 4000

# 自动检测目标
init
halt
