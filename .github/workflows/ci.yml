name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Host: DLMS 协议栈编译 + 测试 ──
  host-build-test:
    name: Host Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: host-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  # ── Firmware: 主固件交叉编译 ──
  firmware-main:
    name: Firmware (femeter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi

      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            firmware/target
          key: fw-main-${{ hashFiles('firmware/Cargo.lock') }}

      - name: Build
        working-directory: firmware
        run: RUSTFLAGS='--cfg freeRTOS' cargo build --release --target thumbv6m-none-eabi --bin femeter --features freertos

      - name: Binary size
        working-directory: firmware
        run: |
          arm-none-eabi-size target/thumbv6m-none-eabi/release/femeter

  # ── Firmware: Bootloader 交叉编译 ──
  firmware-boot:
    name: Firmware (femeter-boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi

      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            firmware/target
          key: fw-boot-${{ hashFiles('firmware/Cargo.lock') }}

      - name: Build
        working-directory: firmware
        run: |
          cp memory-boot.x memory.x
          cargo build --release --target thumbv6m-none-eabi --bin femeter-boot

      - name: Binary size
        working-directory: firmware
        run: |
          arm-none-eabi-size target/thumbv6m-none-eabi/release/femeter-boot
